name: Build and deploy main branch

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  tla-manager-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Install Graphviz
        run: sudo apt-get -y install graphviz
      - name: Build with Maven
        run: |
          cd tla-manager
          mvn -B package --file pom.xml
      - uses: actions/cache@v5
        id: cache-target-manager
        with:
          path: tla-manager/target
          key: tla-sample-app-serverless-manager-${{ github.run_id }}

  tla-resolver-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.0'
      - name: Build with Make
        run: |
          cd tla-resolver
          make build
      - uses: actions/cache@v5
        id: cache-target-resolver
        with:
          path: tla-resolver/dist
          key: tla-sample-app-serverless-resolver-${{ github.run_id }}

  deploy:
    name: deploy
    runs-on: ubuntu-latest
    needs: [tla-manager-build, tla-resolver-build]
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js 25.x
        uses: actions/setup-node@v6
        with:
          node-version: 25.x
      - uses: actions/cache@v5
        id: cache-target-manager
        with:
          path: tla-manager/target
          key: tla-sample-app-serverless-manager-${{ github.run_id }}
      - uses: actions/cache@v5
        id: cache-target-resolver
        with:
          path: tla-resolver/dist
          key: tla-sample-app-serverless-resolver-${{ github.run_id }}
      - run: npm install -g serverless
      - name: Deploy tla-manager
        run: |
          cd tla-manager
          serverless deploy
        env:
          SERVERLESS_ACCESS_KEY: ${{ secrets.SERVERLESS_ACCESS_KEY }}
          TLA_SAMPLE_APP_SERVERLESS_ORG: ${{ secrets.TLA_SAMPLE_APP_SERVERLESS_ORG }}
          SLS_AWS_SDK: 3
      - name: Seed database
        run: |
          cd tla-manager
          serverless invoke --function seed_database --data 'unused'
        env:
          SERVERLESS_ACCESS_KEY: ${{ secrets.SERVERLESS_ACCESS_KEY }}
          TLA_SAMPLE_APP_SERVERLESS_ORG: ${{ secrets.TLA_SAMPLE_APP_SERVERLESS_ORG }}
          SLS_AWS_SDK: 3
      - name: Deploy tla-resolver
        run: |
          cd tla-resolver
          serverless deploy
        env:
          SERVERLESS_ACCESS_KEY: ${{ secrets.SERVERLESS_ACCESS_KEY }}
          TLA_SAMPLE_APP_SERVERLESS_ORG: ${{ secrets.TLA_SAMPLE_APP_SERVERLESS_ORG }}
          SLS_AWS_SDK: 3
