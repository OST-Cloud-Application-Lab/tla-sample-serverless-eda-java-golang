variables:
  PROJECT_VERSION: 1.2-SNAPSHOT
  SLS_IMAGE: registry.gitlab.ost.ch:45023/stefan.kapferer/serverless-framework-docker-image/sls:v1.1

stages:
  - build
  - deploy

tla-manager-build:
  stage: build
  image: eclipse-temurin:21-jdk-noble
  script:
    - echo "Building tla-manager..."
    - cd tla-manager
    - ./mvnw clean package
    - echo "tla-manager successfully built."
  artifacts:
    paths:
      - tla-manager/target/tla-sample-serverless-${PROJECT_VERSION}-aws.jar

tla-resolver-build:
  stage: build
  image: golang:1.26.0-alpine
  before_script:
    - apk add --no-cache git
    - apk add --no-cache make
    - apk add --no-cache zip
  script:
    - echo "Building tla-resolver..."
    - cd tla-resolver
    - make build
    - echo "tla-resolver successfully built."
  artifacts:
    paths:
      - tla-resolver/dist/**/*.zip

.deploy:
  stage: deploy
  image: $SLS_IMAGE
  environment: dev
  variables:
    SERVERLESS_ACCESS_KEY: $SERVERLESS_ACCESS_KEY
    TLA_SAMPLE_APP_SERVERLESS_ORG: $TLA_SAMPLE_APP_SERVERLESS_ORG
  only:
    refs:
      - main

deploy-all:
  extends: .deploy
  script:
    - echo "Deploying tla-manager..."
    - cd tla-manager
    - export SERVERLESS_ACCESS_KEY=${SERVERLESS_ACCESS_KEY}
    - export TLA_SAMPLE_APP_SERVERLESS_ORG=${TLA_SAMPLE_APP_SERVERLESS_ORG}
    - sls deploy
    - sls invoke --function seed_database --data 'unused'
    - cd ../tla-resolver
    - sls deploy
    - echo "Application successfully deployed."

undeploy-all:
  stage: deploy
  image: $SLS_IMAGE
  environment: dev
  variables:
    SERVERLESS_ACCESS_KEY: $SERVERLESS_ACCESS_KEY
    TLA_SAMPLE_APP_SERVERLESS_ORG: $TLA_SAMPLE_APP_SERVERLESS_ORG
  when: manual
  only:
    refs:
      - main
  script:
    - echo "Undeploying application..."
    - cd tla-manager
    - sls remove
    - cd ../tla-resolver
    - sls remove
    - echo "Application successfully undeployed."
